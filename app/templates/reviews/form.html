{% extends "base.html" %}
{% block title %}Новая рецензия — {{ book.title }}{% endblock %}
{% block extra_css %}<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">{% endblock %}
{% block content %}
<h1 class="mb-4">Рецензия на «{{ book.title }}»</h1>
<form method="POST">
<div class="mb-3"><label for="rating" class="form-label">Оценка</label>
<select class="form-select" id="rating" name="rating">
{% for value, label in rating_labels.items()|sort(reverse=true) %}
<option value="{{ value }}" {% if form_data.rating|string == value|string %}selected{% elif value == 5 and not form_data.rating %}selected{% endif %}>{{ label }}</option>
{% endfor %}</select></div>
<div class="mb-3"><label for="text" class="form-label">Текст рецензии</label><textarea class="form-control" id="text" name="text" rows="8">{{ form_data.text or '' }}</textarea></div>
<button type="submit" class="btn btn-primary">Сохранить</button>
<a href="{{ url_for('books.view', book_id=book.id) }}" class="btn btn-secondary">Отмена</a>
</form>{% endblock %}
{% block extra_js %}<script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script><script>
const easyMDE = new EasyMDE({element: document.getElementById('text'), spellChecker: false, status: false});
document.querySelector('form').addEventListener('submit', () => easyMDE.codemirror.save());
</script>{% endblock %}
