{% extends "base.html" %}
{% block title %}Вход — Электронная библиотека{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-5"><div class="card shadow"><div class="card-body p-4">
<h2 class="card-title text-center mb-4">Вход в систему</h2>
<form method="POST" action="{{ url_for('auth.login', next=request.args.get('next')) }}">
<div class="mb-3"><label for="login" class="form-label">Логин</label><input type="text" class="form-control" id="login" name="login" value="{{ login_value or '' }}" required autofocus></div>
<div class="mb-3"><label for="password" class="form-label">Пароль</label><input type="password" class="form-control" id="password" name="password" required></div>
<div class="mb-3 form-check"><input type="checkbox" class="form-check-input" id="remember" name="remember" {% if remember %}checked{% endif %}><label class="form-check-label" for="remember">Запомнить меня</label></div>
<button type="submit" class="btn btn-primary w-100">Войти</button>
</form></div></div></div></div>
{% endblock %}
